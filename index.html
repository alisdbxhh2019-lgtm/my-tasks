<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد پاندایی علی 🐼</title>
    <link rel="icon" href="https://img.icons8.com/plasticine/100/panda.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --success: #4ade80;
            --danger: #ff4757;
            --glass: rgba(15, 23, 42, 0.8);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #0f172a no-repeat center center fixed;
            background-size: cover !important;
            transition: 0.8s; overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3); z-index: -1;
        }

        .main-wrapper {
            display: flex; gap: 20px; width: 95%; max-width: 1150px;
            padding: 20px; flex-wrap: wrap; justify-content: center;
        }

        /* پنل سمت چپ - کوچک */
        .side-panel {
            flex: 1; min-width: 300px; background: var(--glass);
            backdrop-filter: blur(25px); border-radius: 40px;
            padding: 30px; border: 1px solid rgba(255,255,255,0.1);
            color: white; height: fit-content;
        }

        /* پنل سمت راست - بزرگ */
        .content-panel {
            flex: 2.2; min-width: 350px; background: var(--glass);
            backdrop-filter: blur(25px); border-radius: 40px;
            padding: 30px; border: 1px solid rgba(255,255,255,0.1);
            color: white; min-height: 500px;
        }

        /* استایل‌های ساعت و ورودی */
        #digital-clock { font-size: 3rem; font-weight: 800; display: block; text-align: center; }
        #date-persian { color: var(--primary); display: block; text-align: center; margin-bottom: 20px; font-weight: bold; }
        
        .input-box { display: flex; flex-direction: column; gap: 15px; }
        input {
            padding: 15px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1); color: white; outline: none;
        }
        button#add-btn {
            padding: 15px; border-radius: 18px; border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        /* لیست تسک‌ها */
        ul { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        li {
            background: rgba(255, 255, 255, 0.08); padding: 20px; border-radius: 25px;
            display: flex; justify-content: space-between; align-items: center; border-right: 6px solid var(--primary);
        }
        .completed { opacity: 0.3; text-decoration: line-through; border-right-color: var(--success); }

        /* دکمه‌های کنترل ثابت */
        .controls { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 1000; }
        .icon-btn {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.25); color: white; font-size: 26px;
            cursor: pointer; backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; transition: 0.3s;
        }

        /* پنل تنظیمات زیبای قبلی (بازگشت به حالت اول) */
        .settings-panel {
            position: fixed; bottom: 100px; right: -350px;
            width: 290px; background: white; padding: 25px; border-radius: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); transition: 0.5s;
            z-index: 999; color: #333; max-height: 75vh; overflow-y: auto;
        }
        .settings-panel.active { right: 30px; }
        .section-title { font-size: 14px; font-weight: bold; margin: 15px 0 10px; color: #555; border-right: 3px solid var(--primary); padding-right: 8px; }
        .bg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .bg-thumb { height: 55px; border-radius: 12px; cursor: pointer; background-size: cover; transition: 0.2s; border: 2px solid transparent; }
        .bg-thumb:hover { transform: scale(1.1); border-color: var(--primary); }

        /* پنل نمودار */
        .chart-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 90%; max-width: 500px; background: white; padding: 30px; border-radius: 40px;
            z-index: 2000; color: #333; display: none; opacity: 0; transition: 0.4s;
        }
        .chart-panel.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .side-panel, .content-panel { width: 100%; min-width: unset; }
        }
    </style>
</head>
<body>

<div class="controls">
    <button class="icon-btn" onclick="toggleChart()">📈</button>
    <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
</div>

<div class="settings-panel" id="settingsPanel">
    <h3 style="margin:0; text-align:center;">ظاهر سایت علی 🎨</h3>
    <div class="section-title">لینک دلخواه</div>
    <input type="text" id="bgUrlInput" placeholder="https://..." style="width:90%; color:black; border:1px solid #ddd; padding:10px; border-radius:12px; margin-bottom:5px;">
    <button onclick="setCustomBg()" style="width:100%; padding:10px; background:#222; color:white; border:none; border-radius:12px; cursor:pointer;">اعمال عکس</button>

    <div class="section-title">طبیعت و فضا</div>
    <div class="bg-grid">
        <div class="bg-thumb" style="background-image:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=150')" onclick="changeBg('url(\'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070\')')"></div>
        <div class="bg-thumb" style="background-image:url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=150')" onclick="changeBg('url(\'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072\')')"></div>
        <div class="bg-thumb" style="background-image:url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=150')" onclick="changeBg('url(\'https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2071\')')"></div>
    </div>

    <div class="section-title">تم‌های رنگی</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
        <button onclick="changeBg('linear-gradient(135deg, #1e3a8a, #1e40af)')" style="background:#1e40af; color:white; border:none; padding:10px; border-radius:10px; cursor:pointer; font-size:11px;">آبی شب</button>
        <button onclick="changeBg('linear-gradient(135deg, #0f172a, #1e293b)')" style="background:#0f172a; color:white; border:none; padding:10px; border-radius:10px; cursor:pointer; font-size:11px;">تیره کلاسیک</button>
    </div>
    <button onclick="toggleSettings()" style="width:100%; margin-top:20px; padding:12px; background:#eee; border:none; border-radius:15px; cursor:pointer; font-weight:bold;">بستن پنل</button>
</div>

<div class="chart-panel" id="chartPanel">
    <h3 style="text-align:center">تحلیل عملکرد 🐼</h3>
    <canvas id="performanceChart"></canvas>
    <button onclick="toggleChart()" style="width:100%; margin-top:15px; padding:12px; border:none; border-radius:15px; background:#333; color:white; cursor:pointer;">بازگشت</button>
</div>

<div class="main-wrapper" id="mainWrapper">
    <div class="side-panel">
        <span id="digital-clock">00:00:00</span>
        <span id="date-persian">...</span>
        <div class="input-box">
            <label style="font-weight:bold; font-size:14px;">➕ تسک جدید:</label>
            <input type="text" id="taskInput" placeholder="چه کاری داری علی؟">
            <input type="time" id="timeInput">
            <button id="add-btn">افزودن به لیست</button>
        </div>
    </div>

    <div class="content-panel">
        <h2 style="margin-top:0;">📋 لیست کارهای امروز علی</h2>
        <ul id="taskList"></ul>
    </div>
</div>

<script>
    let myChart = null;
    function updateDateTime() {
        const now = new Date();
        document.getElementById('digital-clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
        const days = ["یکشنبه", "دوشنبه", "سه‌شنبه", "چهارشنبه", "پنجشنبه", "جمعه", "شنبه"];
        let pDate = now.toLocaleDateString('fa-IR', { year: 'numeric', month: 'long', day: 'numeric' }).replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d));
        document.getElementById('date-persian').innerText = days[now.getDay()] + " ، " + pDate;
    }
    setInterval(updateDateTime, 1000); updateDateTime();

    function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }
    function toggleChart() {
        const panel = document.getElementById('chartPanel');
        panel.classList.toggle('active');
        if(panel.classList.contains('active')) renderChart();
        document.getElementById('mainWrapper').style.filter = panel.classList.contains('active') ? "blur(15px)" : "none";
    }

    function syncHistory() {
        const tasks = JSON.parse(localStorage.getItem('ali_final_tasks_v2') || '[]');
        let score = 0; tasks.forEach(t => score += t.completed ? 10 : -5);
        let finalPercent = Math.max(0, Math.min(100, 50 + score));
        let history = JSON.parse(localStorage.getItem('ali_final_history_v2') || '{}');
        history[new Date().toLocaleDateString('fa-IR')] = finalPercent;
        localStorage.setItem('ali_final_history_v2', JSON.stringify(history));
    }

    function renderChart() {
        syncHistory();
        const history = JSON.parse(localStorage.getItem('ali_final_history_v2') || '{}');
        const ctx = document.getElementById('performanceChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: Object.keys(history), datasets: [{ data: Object.values(history), borderColor: '#00d2ff', tension: 0.4, fill: true, backgroundColor: 'rgba(0, 210, 255, 0.1)' }] },
            options: { scales: { y: { min: 0, max: 100 } }, plugins: { legend: { display: false } } }
        });
    }

    function changeBg(style) {
        document.body.style.background = style.includes('url') ? `${style} center/cover no-repeat fixed` : style;
        localStorage.setItem('ali_final_bg_v2', style);
    }
    function setCustomBg() { const url = document.getElementById('bgUrlInput').value; if(url) changeBg(`url('${url}')`); }

    const taskInput = document.getElementById('taskInput');
    const timeInput = document.getElementById('timeInput');
    const taskList = document.getElementById('taskList');

    window.onload = () => {
        const savedBg = localStorage.getItem('ali_final_bg_v2'); if(savedBg) changeBg(savedBg);
        const tasks = JSON.parse(localStorage.getItem('ali_final_tasks_v2') || '[]');
        tasks.forEach(createTaskElement);
    };

    document.getElementById('add-btn').addEventListener('click', () => {
        if (!taskInput.value.trim()) return;
        const task = { text: taskInput.value, time: timeInput.value || "--:--", completed: false, id: Date.now() };
        createTaskElement(task); saveLocal(task); syncHistory();
        taskInput.value = ''; timeInput.value = '';
    });

    function createTaskElement(task) {
        const li = document.createElement('li');
        if (task.completed) li.classList.add('completed');
        li.innerHTML = `
            <div onclick="toggleTask(${task.id}, this)" style="cursor:pointer">
                <div style="font-weight:bold;">${task.text}</div>
                <div style="font-size:0.8rem; color:var(--primary);">⏰ ${task.time}</div>
            </div>
            <button onclick="deleteTask(${task.id}, this)" style="background:var(--danger); color:white; border:none; padding:8px 12px; border-radius:12px; cursor:pointer;">حذف</button>
        `;
        taskList.appendChild(li);
    }

    function saveLocal(t) {
        let tasks = JSON.parse(localStorage.getItem('ali_final_tasks_v2') || '[]');
        tasks.push(t); localStorage.setItem('ali_final_tasks_v2', JSON.stringify(tasks));
    }

    function toggleTask(id, el) {
        el.parentElement.classList.toggle('completed');
        let tasks = JSON.parse(localStorage.getItem('ali_final_tasks_v2'));
        tasks.forEach(t => { if(t.id === id) t.completed = !t.completed; });
        localStorage.setItem('ali_final_tasks_v2', JSON.stringify(tasks));
        syncHistory();
    }

    function deleteTask(id, el) {
        el.parentElement.remove();
        let tasks = JSON.parse(localStorage.getItem('ali_final_tasks_v2'));
        tasks = tasks.filter(t => t.id !== id);
        localStorage.setItem('ali_final_tasks_v2', JSON.stringify(tasks));
        syncHistory();
    }
</script>
</body>
</html>
