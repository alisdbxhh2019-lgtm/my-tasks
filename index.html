<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد پاندایی علی 🐼</title>
    <link rel="icon" href="https://img.icons8.com/plasticine/100/panda.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --success: #4ade80;
            --danger: #ff4757;
            --glass: rgba(15, 23, 42, 0.85);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #0f172a no-repeat center center fixed;
            background-size: cover !important;
            transition: 0.8s ease; overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3); z-index: -1;
        }

        .main-wrapper {
            display: flex; gap: 20px; width: 95%; max-width: 1200px;
            padding: 20px; flex-wrap: wrap; justify-content: center;
        }

        /* پنل کنترل سمت چپ */
        .side-panel {
            flex: 1; min-width: 300px; background: var(--glass);
            backdrop-filter: blur(25px); border-radius: 40px;
            padding: 30px; border: 1px solid rgba(255,255,255,0.1);
            color: white; height: fit-content; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* پنل نمایش سمت راست */
        .content-panel {
            flex: 2.5; min-width: 350px; background: var(--glass);
            backdrop-filter: blur(25px); border-radius: 40px;
            padding: 30px; border: 1px solid rgba(255,255,255,0.1);
            color: white; min-height: 550px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        #digital-clock { font-size: 3.2rem; font-weight: 800; display: block; text-align: center; letter-spacing: 2px; }
        #date-persian { color: var(--primary); display: block; text-align: center; margin-bottom: 25px; font-weight: bold; font-size: 1.1rem; }
        
        .input-box { display: flex; flex-direction: column; gap: 15px; }
        input {
            padding: 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1); color: white; outline: none; font-size: 1rem;
        }
        button#add-btn {
            padding: 16px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        button#add-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.4); }

        ul { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        li {
            background: rgba(255, 255, 255, 0.08); padding: 20px; border-radius: 25px;
            display: flex; justify-content: space-between; align-items: center; border-right: 6px solid var(--primary);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from {opacity: 0; transform: translateX(20px);} to {opacity: 1; transform: translateX(0);} }
        .completed { opacity: 0.3; text-decoration: line-through; border-right-color: var(--success); }

        .controls { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 1000; }
        .icon-btn {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.3); color: white; font-size: 28px;
            cursor: pointer; backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .icon-btn:hover { transform: scale(1.1) rotate(10deg); background: var(--primary); }

        /* پنل تنظیمات کامل */
        .settings-panel {
            position: fixed; bottom: 100px; right: -380px;
            width: 320px; background: white; padding: 25px; border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5); transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999; color: #333; max-height: 80vh; overflow-y: auto;
        }
        .settings-panel.active { right: 30px; }
        .settings-panel::-webkit-scrollbar { width: 5px; }
        .settings-panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        .section-title { font-size: 14px; font-weight: 800; margin: 20px 0 10px; color: #444; border-right: 4px solid var(--primary); padding-right: 10px; }
        .bg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .bg-thumb { height: 60px; border-radius: 15px; cursor: pointer; background-size: cover; background-position: center; border: 2px solid transparent; transition: 0.2s; }
        .bg-thumb:hover { transform: scale(1.1); border-color: var(--primary); }

        .color-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .color-btn { height: 45px; border: none; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; font-size: 12px; }

        .chart-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 90%; max-width: 500px; background: white; padding: 35px; border-radius: 45px;
            z-index: 2000; color: #333; display: none; opacity: 0; transition: 0.4s;
        }
        .chart-panel.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        @media (max-width: 950px) {
            .main-wrapper { flex-direction: column; padding: 10px; }
            .side-panel, .content-panel { width: 100%; min-width: unset; }
            #digital-clock { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div class="controls">
    <button class="icon-btn" onclick="toggleChart()">📈</button>
    <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
</div>

<div class="settings-panel" id="settingsPanel">
    <h3 style="margin:0; text-align:center;">شخصی‌سازی داشبورد 🐼</h3>
    
    <div class="section-title">لینک عکس دلخواه</div>
    <input type="text" id="bgUrlInput" placeholder="آدرس تصویر..." style="width:90%; color:black; border:1px solid #ddd; padding:12px; border-radius:15px; margin-bottom:8px; font-size: 13px;">
    <button onclick="setCustomBg()" style="width:100%; padding:12px; background:#222; color:white; border:none; border-radius:15px; cursor:pointer; font-weight:bold;">ثبت آدرس</button>

    <div class="section-title">طبیعت و مناظر</div>
    <div class="bg-grid">
        <div class="bg-thumb" style="background-image:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=150')" onclick="changeBg('url(\'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070\')')"></div>
        <div class="bg-thumb" style="background-image:url('https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=150')" onclick="changeBg('url(\'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?q=80&w=2070\')')"></div>
        <div class="bg-thumb" style="background-image:url('https://images.unsplash.com/photo-1501854140801-50d01698950b?w=150')" onclick="changeBg('url(\'https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=2070\')')"></div>
    </div>

    <div class="section-title">تکنولوژی و فضا</div>
    <div class="bg-grid">
        <div class="bg-thumb" style="background-image:url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=150')" onclick="changeBg('url(\'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072\')')"></div>
        <div class="bg-thumb" style="background-image:url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=150')" onclick="changeBg('url(\'https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2071\')')"></div>
        <div class="bg-thumb" style="background-image:url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=150')" onclick="changeBg('url(\'https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=2072\')')"></div>
    </div>

    <div class="section-title">ماشین و مدرن</div>
    <div class="bg-grid">
        <div class="bg-thumb" style="background-image:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=150')" onclick="changeBg('url(\'https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=2070\')')"></div>
        <div class="bg-thumb" style="background-image:url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=150')" onclick="changeBg('url(\'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070\')')"></div>
        <div class="bg-thumb" style="background-image:url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=150')" onclick="changeBg('url(\'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2044\')')"></div>
    </div>

    <div class="section-title">تم‌های رنگی (گرادینت)</div>
    <div class="color-grid">
        <button class="color-btn" style="background:linear-gradient(135deg, #1e3a8a, #1e40af)" onclick="changeBg('linear-gradient(135deg, #1e3a8a, #1e40af)')">آبی شب</button>
        <button class="color-btn" style="background:linear-gradient(135deg, #064e3b, #065f46)" onclick="changeBg('linear-gradient(135deg, #064e3b, #065f46)')">سبز یشمی</button>
        <button class="color-btn" style="background:linear-gradient(135deg, #701a75, #86198f)" onclick="changeBg('linear-gradient(135deg, #701a75, #86198f)')">بنفش</button>
        <button class="color-btn" style="background:linear-gradient(135deg, #451a03, #78350f)" onclick="changeBg('linear-gradient(135deg, #451a03, #78350f)')">قهوه‌ای</button>
        <button class="color-btn" style="background:linear-gradient(135deg, #0f172a, #1e293b)" onclick="changeBg('linear-gradient(135deg, #0f172a, #1e293b)')">تیره ساده</button>
        <button class="color-btn" style="background:linear-gradient(135deg, #2c3e50, #000000)" onclick="changeBg('linear-gradient(135deg, #2c3e50, #000000)')">مشکی کربن</button>
    </div>

    <button onclick="toggleSettings()" style="width:100%; margin-top:25px; padding:15px; background:#f0f0f0; border:none; border-radius:18px; cursor:pointer; font-weight:bold; color:#333;">بستن تنظیمات</button>
</div>

<div class="chart-panel" id="chartPanel">
    <h3 style="text-align:center">تحلیل عملکرد شما 📈</h3>
    <canvas id="performanceChart"></canvas>
    <button onclick="toggleChart()" style="width:100%; margin-top:20px; padding:15px; border:none; border-radius:20px; background:#333; color:white; cursor:pointer; font-weight:bold;">بازگشت به داشبورد</button>
</div>

<div class="main-wrapper" id="mainWrapper">
    <div class="side-panel">
        <span id="digital-clock">00:00:00</span>
        <span id="date-persian">...</span>
        <div class="input-box">
            <label style="font-weight:bold; font-size:14px; opacity:0.8;">📌 ثبت کار جدید:</label>
            <input type="text" id="taskInput" placeholder="مثلا: مطالعه فصل اول کتاب">
            <input type="time" id="timeInput">
            <button id="add-btn">افزودن به لیست</button>
        </div>
    </div>

    <div class="content-panel">
        <h2 style="margin-top:0; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px;">📋 لیست کارهای امروز علی</h2>
        <ul id="taskList"></ul>
    </div>
</div>

<script>
    let myChart = null;
    function updateDateTime() {
        const now = new Date();
        document.getElementById('digital-clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
        const days = ["یکشنبه", "دوشنبه", "سه‌شنبه", "چهارشنبه", "پنجشنبه", "جمعه", "شنبه"];
        let pDate = now.toLocaleDateString('fa-IR', { year: 'numeric', month: 'long', day: 'numeric' }).replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d));
        document.getElementById('date-persian').innerText = days[now.getDay()] + " ، " + pDate;
    }
    setInterval(updateDateTime, 1000); updateDateTime();

    function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }
    function toggleChart() {
        const panel = document.getElementById('chartPanel');
        panel.classList.toggle('active');
        if(panel.classList.contains('active')) renderChart();
        document.getElementById('mainWrapper').style.filter = panel.classList.contains('active') ? "blur(15px)" : "none";
    }

    function syncHistory() {
        const tasks = JSON.parse(localStorage.getItem('ali_final_tasks_v3') || '[]');
        let score = 0; tasks.forEach(t => score += t.completed ? 10 : -5);
        let finalPercent = Math.max(0, Math.min(100, 50 + score));
        let history = JSON.parse(localStorage.getItem('ali_final_history_v3') || '{}');
        history[new Date().toLocaleDateString('fa-IR')] = finalPercent;
        localStorage.setItem('ali_final_history_v3', JSON.stringify(history));
    }

    function renderChart() {
        syncHistory();
        const history = JSON.parse(localStorage.getItem('ali_final_history_v3') || '{}');
        const ctx = document.getElementById('performanceChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: Object.keys(history), datasets: [{ data: Object.values(history), borderColor: '#00d2ff', tension: 0.4, fill: true, backgroundColor: 'rgba(0, 210, 255, 0.1)' }] },
            options: { scales: { y: { min: 0, max: 100 } }, plugins: { legend: { display: false } } }
        });
    }

    function changeBg(style) {
        document.body.style.background = style.includes('url') ? `${style} center/cover no-repeat fixed` : style;
        localStorage.setItem('ali_final_bg_v3', style);
    }
    function setCustomBg() { const url = document.getElementById('bgUrlInput').value; if(url) changeBg(`url('${url}')`); }

    const taskInput = document.getElementById('taskInput');
    const timeInput = document.getElementById('timeInput');
    const taskList = document.getElementById('taskList');

    window.onload = () => {
        const savedBg = localStorage.getItem('ali_final_bg_v3'); if(savedBg) changeBg(savedBg);
        const tasks = JSON.parse(localStorage.getItem('ali_final_tasks_v3') || '[]');
        tasks.forEach(createTaskElement);
    };

    document.getElementById('add-btn').addEventListener('click', () => {
        if (!taskInput.value.trim()) return;
        const task = { text: taskInput.value, time: timeInput.value || "--:--", completed: false, id: Date.now() };
        createTaskElement(task); saveLocal(task); syncHistory();
        taskInput.value = ''; timeInput.value = '';
    });

    function createTaskElement(task) {
        const li = document.createElement('li');
        if (task.completed) li.classList.add('completed');
        li.innerHTML = `
            <div onclick="toggleTask(${task.id}, this)" style="cursor:pointer; flex:1;">
                <div style="font-weight:bold; font-size:1.1rem;">${task.text}</div>
                <div style="font-size:0.85rem; color:var(--primary); margin-top:5px;">⏰ زمان: ${task.time}</div>
            </div>
            <button onclick="deleteTask(${task.id}, this)" style="background:var(--danger); color:white; border:none; padding:10px 15px; border-radius:15px; cursor:pointer; font-weight:bold;">حذف</button>
        `;
        taskList.appendChild(li);
    }

    function saveLocal(t) {
        let tasks = JSON.parse(localStorage.getItem('ali_final_tasks_v3') || '[]');
        tasks.push(t); localStorage.setItem('ali_final_tasks_v3', JSON.stringify(tasks));
    }

    function toggleTask(id, el) {
        el.parentElement.classList.toggle('completed');
        let tasks = JSON.parse(localStorage.getItem('ali_final_tasks_v3'));
        tasks.forEach(t => { if(t.id === id) t.completed = !t.completed; });
        localStorage.setItem('ali_final_tasks_v3', JSON.stringify(tasks));
        syncHistory();
    }

    function deleteTask(id, el) {
        el.parentElement.remove();
        let tasks = JSON.parse(localStorage.getItem('ali_final_tasks_v3'));
        tasks = tasks.filter(t => t.id !== id);
        localStorage.setItem('ali_final_tasks_v3', JSON.stringify(tasks));
        syncHistory();
    }
</script>
</body>
</html>
